<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FDF6EC"/>

  <!-- Gradient blobs -->
  <circle cx="900" cy="150" r="300" fill="#D4952B" fill-opacity="0.15"/>
  <circle cx="200" cy="500" r="250" fill="#E8835D" fill-opacity="0.1"/>
  <circle cx="1000" cy="450" r="200" fill="#4A6FA5" fill-opacity="0.1"/>

  <!-- Logo area -->
  <text x="100" y="120" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="#1B2A4A">🦫 CapyCo</text>

  <!-- Main headline -->
  <text x="100" y="280" font-family="system-ui, sans-serif" font-size="80" font-weight="bold" fill="#1B2A4A">Build. Ship. Grow.</text>

  <!-- Subheadline -->
  <text x="100" y="360" font-family="system-ui, sans-serif" font-size="32" fill="#6B6B6B">A vibe-first coding &amp; marketing agency</text>
  <text x="100" y="410" font-family="system-ui, sans-serif" font-size="32" fill="#6B6B6B">founded by Brazilians in Canada 🇧🇷🇨🇦</text>

  <!-- CTA Button -->
  <rect x="100" y="460" width="200" height="56" rx="28" fill="#D4952B"/>
  <text x="200" y="495" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">Get Started →</text>

  <!-- Decorative elements -->
  <text x="950" y="580" font-family="monospace" font-size="120" fill="#D4952B" fill-opacity="0.1">&lt;/&gt;</text>
